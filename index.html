<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simon Says</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Simon Says</h1>
    <h2>Welcome to Simon Says <br> Press any key to start the game</h2>
    <h3>High score<p class="hs">0</p></h3>

    <div class="box_container">
        <div class="l1">
            <div class="red btn" type="button" id="red"></div>
            <div class="yellow btn" type="button" id="yellow"></div>
        </div>
        <div class="l2">
            <div class="green btn" type="button" id="green"></div>
            <div class="blue btn" type="button" id="blue"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
